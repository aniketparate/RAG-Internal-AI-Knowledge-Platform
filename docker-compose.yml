services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: rag_platform
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude "data/*"
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - qdrant
      - redis
    volumes:
      - .:/app
      - uploads_data:/tmp/rag_uploads

  worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - qdrant
      - redis
    volumes:
      - .:/app
      - uploads_data:/tmp/rag_uploads

volumes:
  postgres_data:
  qdrant_data:
  uploads_data:

